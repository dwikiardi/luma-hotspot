version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: luma_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - luma_net
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: luma_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://103.137.140.6:8081
      - APP_BASE_PATH=/var/www/html
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=luma_hotspot
      - DB_USERNAME=postgres
      - DB_PASSWORD=secretpassword_staging
      - FASTAPI_URL=http://fastapi:8001
      - RADIUS_SECRET=luma_radius_secret
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    volumes:
      - ./storage:/var/www/html/storage
      - ./:/var/www/html
    networks:
      - luma_net
    depends_on:
      - db

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile.fastapi
    container_name: luma_fastapi
    restart: unless-stopped
    ports:
      - "8002:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    networks:
      - luma_net

  db:
    image: postgres:15-alpine
    container_name: luma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword_staging
    volumes:
      - luma_db_data:/var/lib/postgresql/data
    networks:
      - luma_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.laravel
    container_name: luma_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://103.137.140.6:8081
      - APP_BASE_PATH=/var/www/html
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=luma_hotspot
      - DB_USERNAME=postgres
      - DB_PASSWORD=secretpassword_staging
      - FASTAPI_URL=http://fastapi:8001
      - RADIUS_SECRET=luma_radius_secret
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
    volumes:
      - ./storage:/var/www/html/storage
    networks:
      - luma_net
    depends_on:
      - db

  radius:
    build:
      context: ./docker/radius
      dockerfile: Dockerfile
    container_name: luma_radius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - luma_net
    depends_on:
      - db

networks:
  luma_net:
    driver: bridge

volumes:
  luma_db_data:
